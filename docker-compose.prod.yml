services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: timma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timma_prod_password_change_me}
      POSTGRES_DB: timma
    ports:
      - '127.0.0.1:5435:5432'
    volumes:
      - timma_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U timma']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - '127.0.0.1:3002:3000'
    environment:
      DATABASE_URL: postgresql://timma:${POSTGRES_PASSWORD:-timma_prod_password_change_me}@db:5432/timma
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  timma_pgdata:
