services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: timma
      POSTGRES_PASSWORD: timma_dev_password
      POSTGRES_DB: timma
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U timma']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://timma:timma_dev_password@db:5432/timma
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
